
services:
  minio:
    image: "minio/minio:RELEASE.2025-04-22T22-12-26Z"
    ports:
    - "9000:9000"
    - "9090:9090"
    environment:
      MINIO_ROOT_USER: "root"
      MINIO_ROOT_PASSWORD: 12345678
    volumes:
      - "minio:/data/minio"
    command: minio server /data/minio --console-address ":9090"
    restart:
      always
  redis:
    image: "redis:latest"
    ports: 
      - "6379:6379"
    environment:
      - REDIS_PASSWORD=password
      - REDIS_USER=root
      - REDIS_USER_PASSWORD=password
volumes:
  minio:
    driver: local
    